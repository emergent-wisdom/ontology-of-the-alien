version: '3.8'

services:
  experiment:
    build: .
    volumes:
      # Mount experiment directory (read-write for outputs)
      - ./taxonomy:/experiment/taxonomy
      - ./agents/logs:/experiment/agents/logs

      # Mount Claude Code auth config (so you don't need to re-login)
      # This is the ONLY thing from your home directory the container can see
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro

    environment:
      # If you DO have an API key, you can set it here instead of using OAuth
      # - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Prevent Claude from trying to open a browser inside Docker
      - CLAUDE_CODE_NO_BROWSER=1

    # Keep container alive for interactive use
    stdin_open: true
    tty: true

    # Optional: limit resources to prevent runaway processes
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '4'

  # Alternative: Run specific experiment scripts
  run-experiment:
    build: .
    volumes:
      - ./taxonomy:/experiment/taxonomy
      - ./agents/logs:/experiment/agents/logs
      - ~/.claude:/root/.claude:ro
      - ~/.claude.json:/root/.claude.json:ro
    command: ["python", "agents/graph_cli.py", "state"]
